<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Project Management Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <h1>📊 Project Manager</h1>
        <p>Stay organized, stay productive</p>
      </div>
    </header>

    <main>
      <div class="sidebar">
        <div class="add-task-form">
          <h3>Add New Task</h3>
          <input type="text" id="taskTitle" placeholder="Task title...">
          <select id="taskCategory">
            <option value="">Select Category</option>
            <option value="Design">Design</option>
            <option value="Backend">Backend</option>
            <option value="Frontend">Frontend</option>
            <option value="Testing">Testing</option>
            <option value="Documentation">Documentation</option>
          </select>
          <select id="taskPriority">
            <option value="">Select Priority</option>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
          </select>
          <input type="date" id="taskDueDate">
          <button onclick="addTask()" class="btn-add">+ Add Task</button>
        </div>

        <div class="filters">
          <h3>Filters</h3>
          <button onclick="filterTasks('all')" class="filter-btn active" data-filter="all">All Tasks</button>
          <button onclick="filterTasks('active')" class="filter-btn" data-filter="active">Active</button>
          <button onclick="filterTasks('completed')" class="filter-btn" data-filter="completed">Completed</button>
          <button onclick="filterTasks('High')" class="filter-btn" data-filter="High">High Priority</button>
          <button onclick="filterTasks('Medium')" class="filter-btn" data-filter="Medium">Medium Priority</button>
        </div>

        <div class="stats">
          <div class="stat-box">
            <p class="stat-label">Total Tasks</p>
            <p class="stat-number" id="totalTasks">0</p>
          </div>
          <div class="stat-box">
            <p class="stat-label">Completed</p>
            <p class="stat-number" id="completedTasks">0</p>
          </div>
          <div class="stat-box">
            <p class="stat-label">Pending</p>
            <p class="stat-number" id="pendingTasks">0</p>
          </div>
        </div>
      </div>

      <div class="tasks-section">
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="🔍 Search tasks..." onkeyup="searchTasks()">
        </div>
        <div id="tasksList" class="tasks-list"></div>
      </div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
