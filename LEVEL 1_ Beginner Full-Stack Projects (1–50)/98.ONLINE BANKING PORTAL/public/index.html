<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Banking Portal</title>
  <link rel="stylesheet" href="/public/style.css">
</head>
<body>
  <div id="loginContainer" class="auth-container active">
    <div class="auth-box">
      <div class="auth-header">
        <div class="bank-logo">💳</div>
        <h1>Elite Bank</h1>
        <p>Secure Digital Banking</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="Enter password" required>
        </div>
        <button type="submit" class="btn-primary">Login</button>
        <p class="demo-creds">Demo: john@bank.com / pass123</p>
      </form>
    </div>
  </div>

  <div id="dashboardContainer" class="dashboard-container">
    <nav class="navbar">
      <div class="nav-brand">
        <span class="bank-logo">💳</span>
        <span>Elite Bank</span>
      </div>
      <div class="nav-right">
        <span id="userName" class="user-name"></span>
        <button id="logoutBtn" class="btn-logout">Logout</button>
      </div>
    </nav>

    <div class="dashboard-content">
      <div class="header-section">
        <h2>Welcome, <span id="displayName"></span></h2>
        <p id="dateTime"></p>
      </div>

      <div class="cards-container">
        <div class="card balance-card">
          <div class="card-header">
            <h3>Account Balance</h3>
            <span class="card-icon">💰</span>
          </div>
          <div class="balance-amount">$<span id="balanceAmount">0</span></div>
          <p class="card-subtitle">Account: <span id="accountNumber"></span></p>
        </div>

        <div class="card quick-actions">
          <h3>Quick Actions</h3>
          <div class="action-buttons">
            <button class="action-btn" id="transferBtn">
              <span class="action-icon">💸</span>
              <span>Transfer</span>
            </button>
            <button class="action-btn" id="depositBtn">
              <span class="action-icon">📥</span>
              <span>Deposit</span>
            </button>
            <button class="action-btn" id="transactionsBtn">
              <span class="action-icon">📋</span>
              <span>History</span>
            </button>
          </div>
        </div>
      </div>

      <div class="card transactions-card">
        <div class="card-header">
          <h3>Recent Transactions</h3>
          <span class="card-icon">📊</span>
        </div>
        <div id="transactionsList" class="transactions-list">
          <p class="no-data">Loading transactions...</p>
        </div>
      </div>
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close">&times;</button>
      <h2 id="modalTitle"></h2>
      <form id="actionForm">
        <div class="form-group" id="recipientGroup" style="display:none;">
          <label>Recipient Email</label>
          <input type="email" id="recipientEmail" placeholder="recipient@email.com">
        </div>
        <div class="form-group">
          <label>Amount ($)</label>
          <input type="number" id="actionAmount" placeholder="0.00" min="0.01" step="0.01" required>
        </div>
        <button type="submit" class="btn-primary">Confirm</button>
      </form>
    </div>
  </div>

  <script src="/public/script.js"></script>
</body>
</html>
